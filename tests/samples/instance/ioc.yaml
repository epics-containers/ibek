# yaml-language-server: $schema=https://github.com/epics-containers/ioc-pmac/releases/download/2024.1.2/ibek.ioc.schema.json
ioc_name: "{{ ioc_yaml_file_name }}"

description: auto-generated by https://github.com/epics-containers/builder2ibek

entities:
  - type: pmac.pmacAsynSSHPort
    IP: none
    name: PPMAC1port

  - type: pmac.PowerPMAC
    P: "{{ name }}"
    name: PPMAC1
    NAXES: "8"  # 8 or "8" okay but not "{{ 8 }}"
    pmacAsynSSHPort: PPMAC1port  #"{{ name }}port" # Breaks

  - type: pmac.dls_pmac_asyn_motor
    Controller: PPMAC1
    DESC: X
    M: :{{ DESC }}
    P: "{{ Controller }}"
    ADDR: 1
    DHLM: 14.5
    DLLM: -14.5
    EGU: mm
    MRES: -0.000010
    PREC: 3
    TWV: 1
    UEIP: Yes
    VELO: 50
    VMAX: "{{ VELO }}" # 50  # Using int here breaks

